/* ===========================================================
   奶茶記帳 — 溫柔質感設計系統
   米色 / 奶茶色系・襯線標題・柔和卡片
   =========================================================== */

:root {
  /* milk-tea / beige palette (themeable via Tweaks) */
  --bg: #ece1d3;          /* page behind app */
  --app-bg: #f7f0e7;      /* app canvas */
  --surface: #fffbf5;     /* cards */
  --surface-2: #f3ebdf;   /* subtle fills */
  --ink: #463a2e;         /* primary text - dark mocha */
  --ink-soft: #95836e;    /* secondary text */
  --ink-faint: #b6a690;   /* tertiary */
  --line: #e9ddcc;        /* hairlines */
  --line-soft: #f0e7d9;

  --accent: #bb8a5c;      /* milk-tea caramel */
  --accent-deep: #9c6c40;
  --accent-soft: #efe0cd;
  --accent-tint: #f8efe2;

  --good: #6f9168;        /* profit green (muted) */
  --good-soft: #e3ecdd;
  --warn: #c07a64;        /* loss / warning */
  --warn-soft: #f1e0d8;

  --radius: 22px;
  --radius-sm: 14px;
  --radius-lg: 30px;
  --shadow: 0 1px 2px rgba(96,72,46,.05), 0 10px 30px -16px rgba(96,72,46,.28);
  --shadow-soft: 0 1px 2px rgba(96,72,46,.04), 0 4px 16px -10px rgba(96,72,46,.2);

  --font-head: "Noto Serif TC", Georgia, serif;
  --font-body: "Noto Sans TC", system-ui, sans-serif;
  --font-num: "Outfit", "Noto Sans TC", system-ui, sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: stretch;
}

/* ---- App shell (mobile-first, centered on desktop) ---- */
#root { width: 100%; display: flex; justify-content: center; }

.app {
  width: 100%;
  max-width: 440px;
  min-height: 100dvh;
  background: var(--app-bg);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 60px -20px rgba(96,72,46,.35);
  overflow: hidden;
}
@media (min-width: 480px) {
  .app { min-height: min(900px, 100dvh); margin: auto; border-radius: 34px; }
  body { padding: 24px 0; align-items: center; }
}

/* ---- Header ---- */
.app-header {
  padding: 22px 22px 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 10px;
}
.app-header .greet { font-size: 13px; color: var(--ink-soft); letter-spacing: .04em; }
.app-header h1 {
  font-family: var(--font-head);
  font-weight: 600;
  font-size: 24px;
  margin: 2px 0 0;
  letter-spacing: .01em;
}
.month-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--line);
  color: var(--ink); border-radius: 999px;
  padding: 8px 14px; font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-soft); cursor: pointer;
}

/* ---- Scroll area ---- */
.app-body {
  flex: 1;
  overflow-y: auto;
  padding: 4px 18px 120px;
  -webkit-overflow-scrolling: touch;
}

/* ---- Cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.section-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: 600;
  margin: 24px 4px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-title .sub { font-family: var(--font-body); font-size: 12px; color: var(--ink-soft); font-weight: 400; }

/* ---- Numbers ---- */
.num { font-family: var(--font-num); font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* ---- Bottom tab bar ---- */
.tabbar {
  position: absolute; left: 0; right: 0; bottom: 0;
  display: flex; justify-content: space-around;
  padding: 10px 14px calc(14px + env(safe-area-inset-bottom));
  background: color-mix(in oklab, var(--app-bg) 82%, transparent);
  backdrop-filter: blur(14px) saturate(1.1);
  border-top: 1px solid var(--line);
}
.tab {
  flex: 1; border: none; background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 4px 0; color: var(--ink-faint);
  font-size: 11px; font-weight: 600; letter-spacing: .03em;
  transition: color .2s;
}
.tab.active { color: var(--accent-deep); }
.tab .ic {
  width: 26px; height: 26px; display: grid; place-items: center;
  transition: transform .25s cubic-bezier(.4,1.4,.5,1);
}
.tab.active .ic { transform: translateY(-1px); }
.tab svg { width: 23px; height: 23px; }

/* ---- Buttons ---- */
.btn {
  font-family: var(--font-body); font-weight: 600; font-size: 15px;
  border: none; border-radius: var(--radius-sm);
  padding: 14px 18px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .12s ease, filter .2s, background .2s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 8px 20px -10px var(--accent-deep); }
.btn-primary:hover { background: var(--accent-deep); }
.btn-ghost { background: var(--surface-2); color: var(--ink); }
.btn-ghost:hover { background: var(--accent-soft); }
.btn-block { width: 100%; }

/* ---- Inputs ---- */
.field { margin-bottom: 14px; }
.field > label {
  display: block; font-size: 12.5px; font-weight: 600;
  color: var(--ink-soft); margin: 0 0 7px 4px; letter-spacing: .02em;
}
.input-wrap {
  display: flex; align-items: center;
  background: var(--surface); border: 1.5px solid var(--line);
  border-radius: var(--radius-sm); padding: 0 14px;
  transition: border-color .2s, box-shadow .2s;
}
.input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }
.input-wrap .prefix { color: var(--ink-faint); font-size: 15px; margin-right: 6px; font-family: var(--font-num); }
.input-wrap input {
  flex: 1; border: none; background: none; outline: none;
  font-family: var(--font-num); font-size: 18px; color: var(--ink);
  padding: 13px 0; width: 100%; min-width: 0;
}
.input-wrap input::placeholder { color: var(--ink-faint); font-family: var(--font-body); font-size: 15px; }
.input-wrap .suffix { color: var(--ink-faint); font-size: 14px; margin-left: 6px; }

/* text input plain */
input[type="text"].plain, input[type="date"].plain {
  width: 100%; border: 1.5px solid var(--line); background: var(--surface);
  border-radius: var(--radius-sm); padding: 13px 14px; outline: none;
  font-family: var(--font-body); font-size: 16px; color: var(--ink);
}
input.plain:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }

/* ---- Stepper ---- */
.stepper { display: inline-flex; align-items: center; background: var(--surface-2); border-radius: 999px; padding: 4px; }
.stepper button {
  width: 38px; height: 38px; border-radius: 999px; border: none; cursor: pointer;
  background: var(--surface); color: var(--accent-deep); font-size: 22px; line-height: 1;
  display: grid; place-items: center; box-shadow: var(--shadow-soft);
}
.stepper button:active { transform: scale(.92); }
.stepper .val { min-width: 46px; text-align: center; font-family: var(--font-num); font-size: 19px; font-weight: 600; }

/* ---- Chips ---- */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  border: 1.5px solid var(--line); background: var(--surface);
  border-radius: 999px; padding: 9px 15px; font-size: 14px; font-weight: 600;
  color: var(--ink); cursor: pointer; transition: all .18s; white-space: nowrap;
}
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip.add { color: var(--accent-deep); border-style: dashed; }

/* ---- Slider ---- */
.range {
  -webkit-appearance: none; appearance: none; width: 100%; height: 8px;
  border-radius: 999px; background: var(--accent-soft); outline: none; margin: 6px 0;
  accent-color: var(--accent);
}
.range::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 28px; height: 28px;
  border-radius: 50%; background: #fff; border: 4px solid var(--accent);
  box-shadow: var(--shadow); cursor: pointer;
}
.range::-moz-range-thumb {
  width: 28px; height: 28px; border-radius: 50%; background: #fff;
  border: 4px solid var(--accent); box-shadow: var(--shadow); cursor: pointer;
}

/* ---- Empty state ---- */
.empty {
  text-align: center; padding: 46px 20px; color: var(--ink-soft);
}
.empty .em-ic { font-size: 30px; opacity: .5; margin-bottom: 10px; }
.empty p { margin: 6px 0; font-size: 14px; }

/* ---- Sheet (bottom modal) ---- */
.sheet-backdrop {
  position: absolute; inset: 0; background: rgba(70,58,46,.34);
  backdrop-filter: blur(2px); z-index: 40;
  display: flex; align-items: flex-end;
  animation: fade .2s ease;
}
.sheet {
  width: 100%; background: var(--app-bg);
  border-radius: 28px 28px 0 0; padding: 8px 20px calc(24px + env(safe-area-inset-bottom));
  box-shadow: 0 -16px 40px -16px rgba(70,58,46,.4);
  animation: slideup .3s cubic-bezier(.2,.9,.3,1);
  max-height: 90%; overflow-y: auto;
}
.sheet .grab { width: 42px; height: 5px; border-radius: 999px; background: var(--line); margin: 6px auto 16px; }
.sheet h2 { font-family: var(--font-head); font-size: 19px; margin: 0 0 18px; text-align: center; }
@keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes pop { from { transform: translateY(9px); } to { transform: translateY(0); } }

.fade-in { animation: pop .32s cubic-bezier(.2,.9,.3,1); }

/* utility */
.row { display: flex; align-items: center; gap: 10px; }
.between { display: flex; align-items: center; justify-content: space-between; }
.muted { color: var(--ink-soft); }
.tiny { font-size: 12px; }

/* ---- Inventory ---- */
.sell-btn {
  width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
  border: 2.5px solid var(--accent); background: var(--surface);
  color: var(--accent); display: grid; place-items: center; cursor: pointer;
  transition: transform .12s ease, background .25s, border-color .25s, color .25s;
  position: relative;
}
.sell-btn:not(.sold):active { transform: scale(.86); }
.sell-btn:not(.sold):hover { background: var(--accent-tint); }
.sell-btn .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent-soft); }
.sell-btn.checked { background: var(--accent); border-color: var(--accent); color: #fff; animation: sellpop .45s cubic-bezier(.3,1.5,.5,1); }
.sell-btn.sold { border-color: var(--line); color: var(--ink-faint); background: var(--surface-2); cursor: not-allowed; }
.sell-btn .lbl { font-size: 11px; font-weight: 800; }
@keyframes sellpop { 0% { transform: scale(1); } 45% { transform: scale(1.18); } 100% { transform: scale(1); } }

.inv-row { padding: 13px 15px; display: flex; align-items: center; gap: 14px; transition: opacity .3s; }
.inv-row.out { opacity: .6; }

.stock-num { font-family: var(--font-num); font-weight: 800; line-height: 1; }

.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
.badge.sold-out { background: var(--warn-soft); color: var(--warn); }
.badge.low { background: #f3ead1; color: #a9822f; }
.badge.ok { background: var(--good-soft); color: var(--good); }

.restock-pill {
  border: 1.5px dashed var(--line); background: var(--surface);
  border-radius: 999px; padding: 7px 13px; font-size: 12.5px; font-weight: 700;
  color: var(--accent-deep); cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
}
.restock-pill:active { transform: scale(.96); }

/* toast */
.toast {
  position: absolute; left: 16px; right: 16px; bottom: 88px; z-index: 45;
  background: var(--ink); color: #fff; border-radius: 16px;
  padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 16px 36px -12px rgba(70,58,46,.55); animation: slideup .28s cubic-bezier(.2,.9,.3,1);
}
.toast .t-txt { font-size: 14px; font-weight: 600; }
.toast .t-txt .num { color: #f0d9bf; }
.toast button {
  background: rgba(255,255,255,.16); color: #fff; border: none; border-radius: 10px;
  padding: 8px 13px; font-weight: 700; cursor: pointer; font-family: var(--font-body);
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
}
.toast button:active { transform: scale(.95); }

  </style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-src="shared.jsx">
/* ===========================================================
   共用：儲存、格式化、圖示、基礎元件
   =========================================================== */
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ---- localStorage 儲存（前綴 mt_，不上傳任何地方） ---- */
const STORE_PREFIX = "mt_";
const store = {
  get(key, fallback) {
    try {
      const v = localStorage.getItem(STORE_PREFIX + key);
      return v == null ? fallback : JSON.parse(v);
    } catch (e) { return fallback; }
  },
  set(key, val) {
    try { localStorage.setItem(STORE_PREFIX + key, JSON.stringify(val)); } catch (e) {}
  }
};

/* useState 但自動存進 localStorage */
function usePersistentState(key, initial) {
  const [val, setVal] = useState(() => store.get(key, initial));
  useEffect(() => { store.set(key, val); }, [key, val]);
  return [val, setVal];
}

/* ---- 格式化 ---- */
const fmt = (n) => {
  const r = Math.round(Number(n) || 0);
  return r.toLocaleString("en-US");
};
const NT = (n) => "NT$" + fmt(n);
const pct = (n) => (Math.round((Number(n) || 0) * 10) / 10) + "%";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

const todayISO = () => {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
};
const ymOf = (iso) => (iso || "").slice(0, 7);
const MONTHS_TC = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const fmtMonth = (ym) => {
  if (!ym) return "";
  const [y, m] = ym.split("-");
  return y + "年 " + MONTHS_TC[parseInt(m, 10) - 1];
};
const fmtDateShort = (iso) => {
  if (!iso) return "";
  const [, m, d] = iso.split("-");
  return parseInt(m, 10) + "/" + parseInt(d, 10);
};
const weekdayTC = (iso) => {
  const wd = ["日","一","二","三","四","五","六"];

    case "left": return (<svg {...p}><path d="m15 6-6 6 6 6"/></svg>);
    case "right": return (<svg {...p}><path d="m9 6 6 6-6 6"/></svg>);
    case "coins": return (<svg {...p}><ellipse cx="9" cy="7" rx="5" ry="2.5"/><path d="M4 7v5c0 1.4 2.2 2.5 5 2.5s5-1.1 5-2.5V7"/><path d="M10 14.8c.5 1.2 2.5 2.2 5 2.2 2.8 0 5-1.1 5-2.5v-5"/><path d="M15 9.6c2.8 0 5-1.1 5-2.5S17.8 4.6 15 4.6c-1 0-1.9.1-2.6.4"/></svg>);
    case "box": return (<svg {...p}><path d="M3.5 7.6 12 3l8.5 4.6v8.8L12 21l-8.5-4.6z"/><path d="m3.6 7.7 8.4 4.5 8.4-4.5"/><path d="M12 12.2V21"/></svg>);
    case "check": return (<svg {...p}><path d="m5 12.5 4.5 4.5L19 7"/></svg>);
    case "undo": return (<svg {...p}><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H10"/></svg>);
    case "bag": return (<svg {...p}><path d="M6.5 8h11l-1 11.5a1 1 0 0 1-1 .9H8.5a1 1 0 0 1-1-.9z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>);
    case "restock": return (<svg {...p}><path d="M12 8v8M8 12h8"/><circle cx="12" cy="12" r="9"/></svg>);
    default: return null;
  }
}

/* ---- 統計小卡 ---- */
function Stat({ label, value, tone, big }) {
  const color = tone === "good" ? "var(--good)" : tone === "warn" ? "var(--warn)" : "var(--ink)";
  return (
    <div style={{ flex: 1 }}>
      <div className="tiny muted" style={{ marginBottom: 4, fontWeight: 600 }}>{label}</div>
      <div className="num" style={{ fontSize: big ? 26 : 19, fontWeight: 700, color, lineHeight: 1.1 }}>{value}</div>
    </div>
  );
}

/* ---- 數字輸入框（含前綴） ---- */
function MoneyInput({ value, onChange, placeholder, prefix = "NT$", suffix, autoFocus }) {
  return (
    <div className="input-wrap">
      {prefix && <span className="prefix">{prefix}</span>}
      <input
        type="number" inputMode="decimal" value={value} placeholder={placeholder}
        autoFocus={autoFocus}
        onChange={(e) => onChange(e.target.value)} />
      {suffix && <span className="suffix">{suffix}</span>}
    </div>
  );
}

/* ---- 底部彈出表單 ---- */
function Sheet({ title, onClose, children }) {
  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="grab" />
        {title && <h2>{title}</h2>}
        {children}
      </div>
    </div>
  );
}

Object.assign(window, {
  store, usePersistentState, fmt, NT, pct, uid,
  todayISO, ymOf, fmtMonth, fmtDateShort, weekdayTC, MONTHS_TC,
  Icon, Stat, MoneyInput, Sheet
});

</script>

<script type="text/babel" data-src="pricing.jsx">
/* ===========================================================
   定價頁：進貨成本 → 建議售價 / 利潤
   =========================================================== */

/* 售價建議計算：毛利率 = 利潤 / 售價  →  售價 = 成本 / (1 - 毛利率) */
function priceFromMargin(cost, marginPct) {
  const m = Math.min(Math.max(marginPct, 0), 95) / 100;
  return cost > 0 ? cost / (1 - m) : 0;
}
function marginFromPrice(cost, price) {
  if (price <= 0) return 0;
  return ((price - cost) / price) * 100;
}

function PricingPage({ products, setProducts, defaultMargin }) {
  const [cost, setCost] = useState("");
  const [margin, setMargin] = useState(defaultMargin);
  const [manualPrice, setManualPrice] = useState(null); // 使用者手動覆寫售價
  const [saving, setSaving] = useState(false);
  const [name, setName] = useState("");
  const [stockQty, setStockQty] = useState(1);
  const [editId, setEditId] = useState(null);

  const c = Number(cost) || 0;
  const suggested = priceFromMargin(c, margin);
  const price = manualPrice != null ? (Number(manualPrice) || 0) : Math.round(suggested);
  const effMargin = c > 0 ? marginFromPrice(c, price) : 0;
  const profit = price - c;
  const markup = c > 0 ? price / c : 0;

  const reset = () => { setCost(""); setMargin(defaultMargin); setManualPrice(null); setName(""); setStockQty(1); setEditId(null); };

  const saveProduct = () => {
    if (c <= 0 || !name.trim()) return;
    const item = { id: editId || uid(), name: name.trim(), cost: c, price: Math.round(price), margin: Math.round(effMargin), stock: Math.max(0, stockQty) };
    setProducts((prev) => editId ? prev.map((p) => p.id === editId ? item : p) : [item, ...prev]);
    setSaving(false); reset();
  };

  const editProduct = (p) => {
    setCost(String(p.cost)); setManualPrice(String(p.price)); setMargin(p.margin);
    setName(p.name); setStockQty(p.stock || 0); setEditId(p.id);
    setSaving(true);
  };

  return (
    <div>
      {/* 計算器卡片 */}
      <div className="card fade-in" style={{ padding: 20, marginTop: 12 }}>
        <div className="row" style={{ gap: 8, marginBottom: 16 }}>
          <span style={{ color: "var(--accent-deep)" }}><Icon name="spark" size={20} /></span>
          <span style={{ fontFamily: "var(--font-head)", fontWeight: 600, fontSize: 16 }}>定價小幫手</span>
        </div>

        <div className="field">
          <label>進貨成本（每件批發價）</label>
          <MoneyInput value={cost} onChange={(v) => { setCost(v); setManualPrice(null); }} placeholder="輸入一件進貨多少錢" autoFocus />
        </div>

        <div className="field" style={{ marginBottom: 6 }}>
          <div className="between" style={{ marginBottom: 2 }}>
            <label style={{ margin: 0 }}>目標毛利率</label>
            <span className="num" style={{ fontWeight: 700, color: "var(--accent-deep)", fontSize: 17 }}>{Math.round(manualPrice != null && c > 0 ? effMargin : margin)}%</span>
          </div>
          <input className="range" type="range" min="5" max="90" step="1"
            value={Math.round(manualPrice != null && c > 0 ? effMargin : margin)}
            onChange={(e) => { setMargin(Number(e.target.value)); setManualPrice(null); }} />
          <div className="between tiny muted"><span>薄利多銷</span><span>高單價</span></div>
        </div>
      </div>

      {/* 結果卡 */}
      <div className="card fade-in" style={{ padding: 22, marginTop: 14, background: "linear-gradient(160deg, var(--accent-tint), var(--surface))" }}>
        <div className="tiny muted" style={{ fontWeight: 600 }}>建議售價</div>
        <div className="row" style={{ alignItems: "baseline", gap: 10, marginTop: 2, flexWrap: "wrap" }}>
          <span className="num" style={{ fontSize: 40, fontWeight: 800, color: "var(--accent-deep)", lineHeight: 1 }}>{c > 0 ? NT(price) : "—"}</span>
          {c > 0 && <span className="num tiny" style={{ color: "var(--ink-soft)" }}>約 {markup.toFixed(1)} 倍進價</span>}
        </div>

        {/* 可手動微調售價 */}
        <div className="field" style={{ margin: "16px 0 0" }}>
          <label>想改成整數價？直接調售價</label>
          <MoneyInput value={manualPrice != null ? manualPrice : (c > 0 ? String(Math.round(price)) : "")}
            onChange={(v) => setManualPrice(v)} placeholder="自訂售價" />
        </div>

        <div className="row" style={{ gap: 12, marginTop: 16, paddingTop: 16, borderTop: "1px dashed var(--line)" }}>
          <Stat label="每件淨賺" value={c > 0 ? NT(profit) : "—"} tone={profit >= 0 ? "good" : "warn"} />
          <Stat label="實際毛利率" value={c > 0 ? pct(effMargin) : "—"} tone="good" />
        </div>

        <button className="btn btn-primary btn-block" style={{ marginTop: 18 }}
          disabled={c <= 0}
          onClick={() => { if (c > 0) { setSaving(true); } }}>
                    <span style={{ color: "#fff" }}><Icon name="plus" size={18} /></span> {editId ? "存成商品" : "存成商品（放進庫存）"}
        </button>
      </div>

      {/* 商品庫 */}
      <div className="section-title">
        我的商品 <span className="sub">{products.length} 件</span>
      </div>

      {products.length === 0 ? (
        <div className="card empty">
          <div className="em-ic">🧺</div>
          <p>還沒有商品</p>
          <p className="tiny">上面算好價格後，按「存成商品」就會出現在這裡</p>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {products.map((p) => (
            <div key={p.id} className="card" style={{ padding: "14px 16px", display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 42, height: 42, borderRadius: 12, background: "var(--accent-soft)", display: "grid", placeItems: "center", color: "var(--accent-deep)", flexShrink: 0 }}>
                <Icon name="tag" size={20} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 15, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</div>
                <div className="tiny muted num" style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span>成本 {NT(p.cost)}</span>
                  <span style={{ color: "var(--ink-faint)" }}>・</span>
                  <span style={{ fontWeight: 700, color: (p.stock || 0) > 0 ? "var(--accent-deep)" : "var(--warn)" }}>庫存 {p.stock || 0}</span>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div className="num" style={{ fontWeight: 700, color: "var(--accent-deep)" }}>{NT(p.price)}</div>
                <div className="tiny num" style={{ color: "var(--good)" }}>賺 {NT(p.price - p.cost)}</div>
              </div>
              <button className="iconbtn" onClick={() => editProduct(p)}
                style={{ border: "none", background: "var(--surface-2)", borderRadius: 10, width: 34, height: 34, display: "grid", placeItems: "center", color: "var(--ink-soft)", cursor: "pointer" }}>
                <Icon name="edit" size={16} />
              </button>
            </div>
          ))}
        </div>
      )}

      {/* 命名 / 編輯 表單 */}
      {saving && (
        <Sheet title={editId ? "編輯商品" : "存成商品"} onClose={() => { setSaving(false); if (!editId) setName(""); }}>
          <div className="field">
            <label>商品名稱</label>
            <input className="plain" type="text" value={name} autoFocus
              placeholder="例：碎花洋裝、寬版牛仔褲"
              onChange={(e) => setName(e.target.value)} />
          </div>
          <div className="row" style={{ gap: 10, margin: "4px 0 14px", flexWrap: "wrap" }}>
            <div className="card" style={{ flex: 1, padding: "10px 14px", boxShadow: "none" }}>
              <div className="tiny muted">成本</div><div className="num" style={{ fontWeight: 700 }}>{NT(c)}</div>
            </div>
            <div className="card" style={{ flex: 1, padding: "10px 14px", boxShadow: "none" }}>
              <div className="tiny muted">售價</div><div className="num" style={{ fontWeight: 700, color: "var(--accent-deep)" }}>{NT(price)}</div>
            </div>
            <div className="card" style={{ flex: 1, padding: "10px 14px", boxShadow: "none" }}>
              <div className="tiny muted">每件賺</div><div className="num" style={{ fontWeight: 700, color: "var(--good)" }}>{NT(profit)}</div>
            </div>
          </div>

          {/* 庫存數量 */}
          <div className="field">
            <label>{editId ? "目前庫存（進貨幾件）" : "進貨了幾件？（庫存數量）"}</label>
            <div className="between">
              <div className="stepper">
                <button onClick={() => setStockQty(Math.max(0, stockQty - 1))}>−</button>
                <span className="val">{stockQty}</span>
                <button onClick={() => setStockQty(stockQty + 1)}>＋</button>
              </div>
              <div className="row" style={{ gap: 6 }}>
                {[5, 10, 20].map((n) => (
                  <button key={n} className="chip" style={{ padding: "7px 12px" }} onClick={() => setStockQty(n)}>{n}</button>
                ))}
              </div>
            </div>
            <div className="tiny muted" style={{ marginTop: 8, marginLeft: 2 }}>存好後會出現在「庫存」分頁，每賣出一件點一下圈圈就自動扣 1</div>
          </div>
          <div className="row" style={{ gap: 10 }}>
            {editId && (
              <button className="btn btn-ghost" style={{ color: "var(--warn)" }}
                onClick={() => { setProducts((prev) => prev.filter((x) => x.id !== editId)); setSaving(false); reset(); }}>
                <Icon name="trash" size={18} />
              </button>
            )}
            <button className="btn btn-primary" style={{ flex: 1 }} disabled={!name.trim()} onClick={saveProduct}>
              {editId ? "儲存變更" : "加入商品庫"}
            </button>
          </div>
        </Sheet>
      )}
    </div>
  );
}

window.PricingPage = PricingPage;

</script>

<script type="text/babel" data-src="orders.jsx">
/* ===========================================================
   庫存頁：圈選賣出（每點一下扣 1 件、記一筆銷售）
   訂單 order = { id, date, name, qty, price, cost, productId }
   商品 product 多了 stock（庫存數量）
   =========================================================== */

function InventoryPage({ products, setProducts, orders, setOrders }) {
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const [pop, setPop] = useState(null);        // 剛點選的商品 id（打勾動畫）
  const [restockId, setRestockId] = useState(null);
  const [restockQty, setRestockQty] = useState(5);

  const today = todayISO();

  // 各商品今天賣出件數
  const soldToday = useMemo(() => {
    const m = {};
    orders.forEach((o) => { if (o.date === today && o.productId) m[o.productId] = (m[o.productId] || 0) + o.qty; });
    return m;
  }, [orders, today]);

  // 今天總計
  const dayAgg = useMemo(() => {
    let qty = 0, rev = 0, prof = 0;
    orders.forEach((o) => { if (o.date === today) { qty += o.qty; rev += o.price * o.qty; prof += (o.price - o.cost) * o.qty; } });
    return { qty, rev, prof };
  }, [orders, today]);

  const clearToast = () => { if (toastTimer.current) clearTimeout(toastTimer.current); };
  useEffect(() => () => clearToast(), []);

  // 賣出一件
  const sellOne = (p) => {
    if ((p.stock || 0) <= 0) return;
    const order = { id: uid(), date: today, name: p.name, qty: 1, price: p.price, cost: p.cost, productId: p.id };
    setOrders((prev) => [order, ...prev]);
    setProducts((prev) => prev.map((x) => x.id === p.id ? { ...x, stock: Math.max(0, (x.stock || 0) - 1) } : x));
    setPop(p.id);
    setTimeout(() => setPop((cur) => cur === p.id ? null : cur), 450);
    clearToast();
    setToast({ orderId: order.id, productId: p.id, name: p.name, profit: p.price - p.cost });
    toastTimer.current = setTimeout(() => setToast(null), 3600);
  };

  // 復原一筆銷售（補回庫存）
  const undoSale = (orderId, productId) => {
    setOrders((prev) => prev.filter((o) => o.id !== orderId));
    if (productId) setProducts((prev) => prev.map((x) => x.id === productId ? { ...x, stock: (x.stock || 0) + 1 } : x));
    setToast(null); clearToast();
  };

  const doRestock = () => {
    setProducts((prev) => prev.map((x) => x.id === restockId ? { ...x, stock: (x.stock || 0) + restockQty } : x));
    setRestockId(null); setRestockQty(5);
  };

  // 最近賣出（跨日，最多 8 筆）
  const recent = useMemo(() =>
    [...orders].sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id)).slice(0, 8),
    [orders]);

  // 排序：有庫存的在前，售完沉底
  const sorted = useMemo(() =>
    [...products].sort((a, b) => ((b.stock || 0) > 0) - ((a.stock || 0) > 0)),
    [products]);

  if (products.length === 0) {
    return (
      <div className="card empty" style={{ marginTop: 16 }}>
        <div className="em-ic">📦</div>
        <p>庫存還是空的</p>
        <p className="tiny">先到「定價」分頁把商品算好價格、填入進貨數量，<br />存成商品後就會出現在這裡</p>
      </div>
    );
  }

  return (
    <div>
      {/* 今日總計 */}
      <div className="card fade-in" style={{ padding: 18, marginTop: 12, display: "flex", gap: 12 }}>
        <Stat label="今天賣出" value={dayAgg.qty + " 件"} />
        <div style={{ width: 1, background: "var(--line)" }} />
        <Stat label="今日營收" value={NT(dayAgg.rev)} />
        <div style={{ width: 1, background: "var(--line)" }} />
        <Stat label="今日淨賺" value={NT(dayAgg.prof)} tone="good" />
      </div>

      <div className="section-title">
        商品庫存 <span className="sub">點圈圈 ✓ 賣出一件</span>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {sorted.map((p) => {
          const stock = p.stock || 0;
          const out = stock <= 0;
          const low = stock > 0 && stock <= 2;
          const st = soldToday[p.id] || 0;
          return (
            <div key={p.id} className={"card inv-row" + (out ? " out" : "")}>
              {/* 圈選賣出 */}
              <button className={"sell-btn" + (out ? " sold" : "") + (pop === p.id ? " checked" : "")}
                onClick={() => sellOne(p)} disabled={out} title={out ? "已售完" : "賣出一件"}>
                {out ? <span className="lbl">售完</span> : (pop === p.id ? <Icon name="check" size={26} /> : <span className="dot" />)}
              </button>

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 15.5, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</div>
                <div className="tiny muted num" style={{ marginTop: 2 }}>售 {NT(p.price)} ・ 賺 {NT(p.price - p.cost)}/件</div>
                <div className="row" style={{ gap: 6, marginTop: 7 }}>
                  {out ? <span className="badge sold-out">已售完</span>
                    : low ? <span className="badge low">剩不多</span>
                    : <span className="badge ok">有貨</span>}
                  {st > 0 && <span className="tiny num" style={{ color: "var(--accent-deep)", fontWeight: 700 }}>今天 +{st}</span>}
                  <button className="restock-pill" onClick={() => { setRestockId(p.id); setRestockQty(5); }}>
                    <Icon name="restock" size={14} /> 補貨
                  </button>
                </div>
              </div>

              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div className="stock-num" style={{ fontSize: 30, color: out ? "var(--warn)" : "var(--accent-deep)" }}>{stock}</div>
                <div className="tiny muted">剩餘</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* 最近賣出 */}
      {recent.length > 0 && (
        <div>
          <div className="section-title">最近賣出 <span className="sub">點 ↩ 可復原</span></div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {recent.map((o) => (
              <div key={o.id} className="card" style={{ padding: "11px 14px", display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ color: "var(--good)" }}><Icon name="bag" size={18} /></span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{o.name}</div>
                  <div className="tiny muted num">{fmtDateShort(o.date)} ・ 賺 {NT(o.price - o.cost)}</div>
                </div>
                <button onClick={() => undoSale(o.id, o.productId)}
                  style={{ border: "1px solid var(--line)", background: "var(--surface)", borderRadius: 9, padding: "6px 10px", color: "var(--ink-soft)", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4, fontSize: 12.5, fontWeight: 700, fontFamily: "var(--font-body)" }}>
                  <Icon name="undo" size={14} /> 復原
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 賣出 toast（含復原） */}
      {toast && (
        <div className="toast">
          <div className="t-txt">已賣出 {toast.name} ・ 賺 <span className="num">{NT(toast.profit)}</span></div>
          <button onClick={() => undoSale(toast.orderId, toast.productId)}><Icon name="undo" size={15} /> 復原</button>
        </div>
      )}

      {/* 補貨表單 */}
      {restockId && (() => {
        const p = products.find((x) => x.id === restockId);
        if (!p) return null;
        return (
          <Sheet title={"補貨：" + p.name} onClose={() => setRestockId(null)}>
            <div className="field">
              <label>這次進貨幾件？</label>
              <div className="between">
                <div className="stepper">
                  <button onClick={() => setRestockQty(Math.max(1, restockQty - 1))}>−</button>
                  <span className="val">{restockQty}</span>
                  <button onClick={() => setRestockQty(restockQty + 1)}>＋</button>
                </div>
                <div className="row" style={{ gap: 6 }}>
                  {[5, 10, 20].map((n) => (
                    <button key={n} className="chip" style={{ padding: "7px 12px" }} onClick={() => setRestockQty(n)}>{n}</button>
                  ))}
                </div>
              </div>
              <div className="tiny muted" style={{ marginTop: 10, marginLeft: 2 }}>
                目前庫存 {p.stock || 0} 件，補貨後變成 <span className="num" style={{ fontWeight: 700, color: "var(--accent-deep)" }}>{(p.stock || 0) + restockQty}</span> 件
              </div>
            </div>
            <button className="btn btn-primary btn-block" onClick={doRestock}>確認補貨</button>
          </Sheet>
        );
      })()}
    </div>
  );
}

window.InventoryPage = InventoryPage;

</script>

<script type="text/babel" data-src="stats.jsx">
/* ===========================================================
   統計頁：每月營收 / 成本 / 淨利 + 趨勢圖 + 熱賣商品
   =========================================================== */

function StatsPage({ orders }) {
  const monthsWithData = useMemo(() => {
    const set = new Set(orders.map((o) => ymOf(o.date)));
    return [...set].sort();
  }, [orders]);

  const [ym, setYm] = useState(() => ymOf(todayISO()));

  // 當月訂單彙總
  const monthOrders = useMemo(() => orders.filter((o) => ymOf(o.date) === ym), [orders, ym]);
  const agg = useMemo(() => {
    let rev = 0, cost = 0, items = 0;
    monthOrders.forEach((o) => { rev += o.price * o.qty; cost += o.cost * o.qty; items += o.qty; });
    const profit = rev - cost;
    return { rev, cost, profit, items, count: monthOrders.length, margin: rev > 0 ? (profit / rev) * 100 : 0 };
  }, [monthOrders]);

  // 近 6 個月趨勢（淨利）
  const trend = useMemo(() => {
    const arr = [];
    const base = new Date(ym + "-01T00:00:00");
    for (let i = 5; i >= 0; i--) {
      const d = new Date(base.getFullYear(), base.getMonth() - i, 1);
      const key = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
      let profit = 0, rev = 0;
      orders.forEach((o) => { if (ymOf(o.date) === key) { profit += (o.price - o.cost) * o.qty; rev += o.price * o.qty; } });
      arr.push({ key, label: MONTHS_TC[d.getMonth()], profit, rev });
    }
    return arr;
  }, [orders, ym]);
  const maxProfit = Math.max(1, ...trend.map((t) => Math.abs(t.profit)));

  // 熱賣商品（依淨利排序）
  const topProducts = useMemo(() => {
    const map = {};
    monthOrders.forEach((o) => {
      const k = o.name;
      if (!map[k]) map[k] = { name: k, qty: 0, profit: 0, rev: 0 };
      map[k].qty += o.qty; map[k].profit += (o.price - o.cost) * o.qty; map[k].rev += o.price * o.qty;
    });
    return Object.values(map).sort((a, b) => b.profit - a.profit).slice(0, 5);
  }, [monthOrders]);

  const shiftMonth = (delta) => {
    const d = new Date(ym + "-01T00:00:00");
    d.setMonth(d.getMonth() + delta);
    setYm(d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"));
  };

  return (
    <div>
      {/* 月份切換 */}
      <div className="row between fade-in" style={{ marginTop: 14, marginBottom: 14 }}>
        <button onClick={() => shiftMonth(-1)} style={navBtn}><Icon name="left" size={20} /></button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "var(--font-head)", fontWeight: 600, fontSize: 19 }}>{fmtMonth(ym)}</div>
          <div className="tiny muted">{agg.count} 筆訂單 ・ 售出 {agg.items} 件</div>
        </div>
        <button onClick={() => shiftMonth(1)} style={navBtn}><Icon name="right" size={20} /></button>
      </div>

      {/* 淨利大卡 */}
      <div className="card fade-in" style={{ padding: 24, background: "linear-gradient(155deg, var(--accent-tint), var(--surface))", textAlign: "center" }}>
        <div className="tiny muted" style={{ fontWeight: 600, letterSpacing: ".05em" }}>本月淨利</div>
        <div className="num" style={{ fontSize: 46, fontWeight: 800, color: agg.profit >= 0 ? "var(--accent-deep)" : "var(--warn)", lineHeight: 1.05, margin: "4px 0" }}>
          {NT(agg.profit)}
        </div>
        <div className="num tiny muted">毛利率 {pct(agg.margin)}</div>
      </div>

      {/* 營收 / 成本 */}
      <div className="row" style={{ gap: 12, marginTop: 12 }}>
        <div className="card" style={{ flex: 1, padding: 18 }}>
          <div className="tiny muted" style={{ fontWeight: 600 }}>總營收</div>
          <div className="num" style={{ fontSize: 23, fontWeight: 700 }}>{NT(agg.rev)}</div>
        </div>
        <div className="card" style={{ flex: 1, padding: 18 }}>
          <div className="tiny muted" style={{ fontWeight: 600 }}>進貨成本</div>
          <div className="num" style={{ fontSize: 23, fontWeight: 700, color: "var(--warn)" }}>{NT(agg.cost)}</div>
        </div>
      </div>

      {/* 趨勢圖 */}
      <div className="section-title">近 6 個月淨利</div>
      <div className="card" style={{ padding: "20px 16px 14px" }}>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 130 }}>
          {trend.map((t) => {
            const h = Math.max(4, (Math.abs(t.profit) / maxProfit) * 104);
            const isCur = t.key === ym;
            const neg = t.profit < 0;
            return (
              <div key={t.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, height: "100%", justifyContent: "flex-end" }}>
                <div className="num tiny" style={{ color: isCur ? "var(--accent-deep)" : "var(--ink-faint)", fontWeight: 700, fontSize: 10 }}>
                  {t.profit !== 0 ? (Math.abs(t.profit) >= 1000 ? (t.profit / 1000).toFixed(t.profit % 1000 === 0 ? 0 : 1) + "k" : fmt(t.profit)) : ""}
                </div>
                <div style={{
                  width: "100%", maxWidth: 30, height: h, borderRadius: 8,
                  background: neg ? "var(--warn-soft)" : (isCur ? "var(--accent)" : "var(--accent-soft)"),
                  border: neg ? "1.5px solid var(--warn)" : "none",
                  transition: "height .4s cubic-bezier(.2,.9,.3,1)"
                }} />
                <div className="tiny" style={{ color: isCur ? "var(--ink)" : "var(--ink-faint)", fontWeight: isCur ? 700 : 500, fontSize: 11 }}>{t.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 熱賣商品 */}
      <div className="section-title">本月最賺商品 <span className="sub">依淨利</span></div>
      {topProducts.length === 0 ? (
        <div className="card empty" style={{ padding: 32 }}>
          <div className="em-ic">📊</div>
          <p className="tiny">這個月還沒有訂單</p>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
          {topProducts.map((p, i) => {
            const max = topProducts[0].profit || 1;
            const w = Math.max(8, (p.profit / max) * 100);
            return (
              <div key={p.name} className="card" style={{ padding: "13px 16px" }}>
                <div className="between" style={{ marginBottom: 8 }}>
                  <div className="row" style={{ gap: 9 }}>
                    <span style={{ width: 22, height: 22, borderRadius: 7, background: i === 0 ? "var(--accent)" : "var(--surface-2)", color: i === 0 ? "#fff" : "var(--ink-soft)", fontSize: 12, fontWeight: 700, display: "grid", placeItems: "center" }} className="num">{i + 1}</span>
                    <span style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</span>
                  </div>
                  <div className="num" style={{ fontWeight: 700, color: "var(--good)" }}>{NT(p.profit)}</div>
                </div>
                <div style={{ height: 7, borderRadius: 99, background: "var(--surface-2)", overflow: "hidden" }}>
                  <div style={{ height: "100%", width: w + "%", borderRadius: 99, background: "var(--accent)", transition: "width .5s ease" }} />
                </div>
                <div className="tiny muted num" style={{ marginTop: 6 }}>售出 {p.qty} 件 ・ 營收 {NT(p.rev)}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const navBtn = {
  border: "1px solid var(--line)", background: "var(--surface)", borderRadius: 12,
  width: 42, height: 42, display: "grid", placeItems: "center", color: "var(--ink)",
  cursor: "pointer", boxShadow: "var(--shadow-soft)"
};

window.StatsPage = StatsPage;

</script>

<script type="text/babel" data-src="app.jsx">
/* ===========================================================
   App 外殼：頂部、底部分頁、Tweaks
   =========================================================== */

const THEMES = {
  "奶茶": { accent: "#bb8a5c", deep: "#9c6c40", soft: "#efe0cd", tint: "#f8efe2", bg: "#ece1d3", app: "#f7f0e7" },
  "玫瑰奶霜": { accent: "#c08a86", deep: "#a3635e", soft: "#f0dcd9", tint: "#f9eeec", bg: "#ecdfdc", app: "#f8efed" },
  "抹茶奶蓋": { accent: "#94a06a", deep: "#74804b", soft: "#e3e7cd", tint: "#f2f4e8", bg: "#e3e3d3", app: "#f3f4ea" },
  "可可棕": { accent: "#a87b54", deep: "#7e5733", soft: "#e7d6c4", tint: "#f4eadd", bg: "#e6dac9", app: "#f4ece0" }
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "奶茶",
  "defaultMargin": 50,
  "serifTitle": true
}/*EDITMODE-END*/;

const TABS = [
  { id: "price", label: "定價", icon: "price" },
  { id: "orders", label: "庫存", icon: "box" },
  { id: "stats", label: "統計", icon: "chart" }
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = usePersistentState("tab", "price");
  const [products, setProducts] = usePersistentState("products", []);
  const [orders, setOrders] = usePersistentState("orders", []);

  // 套用主題色
  const theme = THEMES[t.theme] || THEMES["奶茶"];
  const appStyle = {
    "--accent": theme.accent, "--accent-deep": theme.deep,
    "--accent-soft": theme.soft, "--accent-tint": theme.tint,
    "--bg": theme.bg, "--app-bg": theme.app,
    "--font-head": t.serifTitle ? '"Noto Serif TC", serif' : '"Noto Sans TC", sans-serif'
  };
  useEffect(() => { document.body.style.background = theme.bg; }, [theme.bg]);

  // 本月即時摘要（顯示於頂部）
  const thisMonth = ymOf(todayISO());
  const monthProfit = orders.reduce((s, o) => ymOf(o.date) === thisMonth ? s + (o.price - o.cost) * o.qty : s, 0);

  const headTitle = { price: "定價小幫手", orders: "庫存管理", stats: "營收統計" }[tab];

  return (
    <div className="app" style={appStyle}>
      <div className="app-header">
        <div>
          <div className="greet">iuaM ・ 衣服小生意</div>
          <h1>{headTitle}</h1>
        </div>
        <button className="month-pill" onClick={() => setTab("stats")} title="本月淨利">
          <span style={{ color: "var(--accent-deep)" }}><Icon name="coins" size={16} /></span>
          <span className="num">{NT(monthProfit)}</span>
        </button>
      </div>

      <div className="app-body" key={tab}>
        {tab === "price" && <PricingPage products={products} setProducts={setProducts} defaultMargin={t.defaultMargin} />}
        {tab === "orders" && <InventoryPage products={products} setProducts={setProducts} orders={orders} setOrders={setOrders} />}
        {tab === "stats" && <StatsPage orders={orders} />}
      </div>

      <nav className="tabbar">
        {TABS.map((tb) => (
          <button key={tb.id} className={"tab" + (tab === tb.id ? " active" : "")} onClick={() => setTab(tb.id)}>
            <span className="ic"><Icon name={tb.icon} /></span>
            {tb.label}
          </button>
        ))}
      </nav>

      <TweaksPanel>
        <TweakSection label="外觀" />
        <TweakRadio label="色系主題" value={t.theme}
          options={Object.keys(THEMES)}
          onChange={(v) => setTweak("theme", v)} />
        <TweakToggle label="襯線體標題" value={t.serifTitle} onChange={(v) => setTweak("serifTitle", v)} />
        <TweakSection label="定價" />
        <TweakSlider label="預設目標毛利率" value={t.defaultMargin} min={20} max={80} step={5} unit="%"
          onChange={(v) => setTweak("defaultMargin", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
